<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>オンライン食べ物販売</title>
  </head>



  <body>


  
   <header class="bg-red-400 p-6">

    <h1 class="text-4xl font-bold ml-6 text-white">🥢 24時間食べ物屋さん 🥄</h1>

   </header>

   <main class="bg-white p-6">

    <h2 class="text-3xl font-bold text-red-900 mt-6 mb-8">　　食べ物一覧</h2>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">


     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🥚</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">やさしい塩味のゆで卵<br><span class="text-xl text-amber-950">2個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥100</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🈭</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">中印の伝統肉まん<br><span class="text-xl text-amber-950">1個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥150</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🥟</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">パリパリの羽が付いた餃子<br><span class="text-xl text-amber-950">5個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥250</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🦐</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">そんなに辛くないエビチリ<br><span class="text-xl text-amber-950">2個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥350</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🍜</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">豚骨がおいしいニ蘭ラーメン<br><span class="text-xl text-amber-950">2個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥450</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🦀</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">剥きやすく食べやすい蟹<br><span class="text-xl text-amber-950">2個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥1000</h4>
     </div>

     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🍡</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">知る人ぞ知る団子<br><span class="text-xl text-amber-950">5個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥1200</h4>
     </div>
     
     <div class="bg-red-50 rounded-lg shadow-lg hover:scale-110 transition p-6">
      <div class="text-4xl ml-10 mb-2">🦆</div>
      <h3 class="font-bold text-2xl text-center text-amber-950">香港の人が作る北京填鴨<br><span class="text-xl text-amber-950">1個入り</h3>
      <h4 class="text-red-900 ml-10 mt-2 text-lg font-bold">￥2000</h4>
     </div>

    


   </main>


  </body>

  

</html>
