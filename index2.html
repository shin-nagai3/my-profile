<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>むらパフェ</title>
  </head>



 <body class="bg-pink-50 items-center justify-center min-h-screen">


   <header class="bg-white shadow p-6">
    <div>
     <h1 class="text-2xl font-bold text-pink-600 text-center">むらパフェ</h1>
      <p class="text-amber-900 text-sm font-bold mt-1 text-center">長生村唯一のパフェ専門店</p>
    </div>
   </header>


   <main class="max-w-xl mx-auto p-4">


    <section class="mt-10 mb-8">

     <h2 class="text-xl font-bold text-pink-800">Parfait Menu</h2>

     <div class="bg-white rounded-lg shadow p-6 mb-4">
      <a href="./images/Gemini_Generated_Image_xtevoxtevoxtevox.png"
         class="text-xl font-bold text-pink-600 hover:text-pink-400">長生村産苺とチョコレートのパフェ</a>
      <p class="text-sm text-amber-900 mt-1">苺の甘酸っぱさとミルクチョコレートの甘さの繊細な調和</p>
      <p class="text-lg mt-3">1000円</p>
     </div>
     <div class="bg-white rounded-lg shadow p-6 mb-4">
      <a href="./images/Gemini_Generated_Image_ruem16ruem16ruem.png"
         class="text-lg font-bold text-cyan-500 hover:text-cyan-300">夏のチョコミントパフェ</a>
      <p class="text-sm text-amber-900 mt-1">一松海岸から見える太平洋をイメージした水色のパフェ</p>
      <p class="text-lg mt-3">950円</p>
     </div>

    <h2 class="text-xl font-bold text-pink-800 mt-20 ">Set Drink Menu</h2>

     <div class="flex justify-between">

      <div class="bg-white rounded-lg shadow p-7 mb-4">
        <p class="text-xl font-bold text-amber-900">カフェラテ</p>
        <p class="text-lg mt-3">300円</p>
      </div>
      <div class="bg-white rounded-lg shadow p-7 mb-4 ml-4">
        <p class="text-lg font-bold text-amber-900"> コーヒー</p>
        <p class="text-lg mt-3">300円</p>
      </div>
      <div class="bg-white rounded-lg shadow p-7 mb-4 ml-4">
        <p class="text-lg font-bold text-amber-900">紅茶</p>
        <p class="text-lg mt-3">300円</p>
      </div>
      <div class="bg-white rounded-lg shadow p-7 mb-4 ml-4">
        <p class="text-lg font-bold text-amber-900">ミルクティー</p>
        <p class="text-lg mt-3">350円</p>
      </div>

     </div>

    </section>


   </main>
      



 </body>



</html>
